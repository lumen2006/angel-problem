<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>抓住神经猫 · 耄耋</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1c2028;
      color: #e8ecf4;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 12px 16px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e8ecf4;
    }
    header p {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.45;
    }
    .board-wrap {
      flex: 1 1 auto;
      width: 100%;
      min-height: 360px;
      height: clamp(380px, 68vh, 560px);
      margin: 8px 0;
      border-radius: 12px;
      overflow: hidden;
      background: #252b3a;
      border: 1px solid #3d4659;
      position: relative;
    }
    #board {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: manipulation;
      cursor: pointer;
    }
    .status-panel {
      flex: 0 0 auto;
      height: 3.4rem;
      overflow: hidden;
    }
    .status {
      font-size: 1rem;
      color: #6ee7b7;
      height: 1.5rem;
      line-height: 1.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status.over { color: #f87171; }
    .hint {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #64748b;
      height: 1.25rem;
      line-height: 1.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toolbar {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      background: #3d4a63;
      color: #e8ecf4;
    }
    button:active { background: #4a5875; }
    button.primary {
      background: #2d6a5a;
      color: #6ee7b7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>抓住神经猫</h1>
      <p>六角格围捕：你每回合放一枚障碍，猫用 BFS 逃向最近边境。开局约 10% 随机障碍。</p>
    </header>

    <div class="board-wrap">
      <canvas id="board"></canvas>
    </div>

    <div class="status-panel">
      <div id="status" class="status">加载中…</div>
      <div id="hint" class="hint">&nbsp;</div>
    </div>

    <div class="toolbar">
      <button type="button" id="btn-reset" class="primary">新局（随机障碍）</button>
      <button type="button" id="btn-blank">新局（空白）</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
